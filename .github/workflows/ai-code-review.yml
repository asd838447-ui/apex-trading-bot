name: Gemini AI Auto-Fixer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  fixer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run AI Auto-Fixer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Устанавливаем библиотеку для работы с Gemini
          pip install google-generativeai
          
          # Запускаем Python-скрипт, который проанализирует файлы и сделает коммит
          python .github/scripts/fix_code.py
      
      - name: Commit changes
        run: |
          git config --global user.name "AI Auto-Fixer"
          git config --global user.email "ai@bot.com"
          git add .
          git commit -m "AI: Исправление архитектурных ошибок" || echo "Изменений нет"
          git push
