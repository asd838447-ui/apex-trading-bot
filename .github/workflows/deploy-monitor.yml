name: Render Deploy Monitor & Auto-Fix

on:
  push:
    branches:
      - main # Скрипт срабатывает только при обновлении основной ветки

permissions:
  contents: write

jobs:
  monitor-and-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-genai requests

      - name: Wait for Render and Validate Data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RENDER_APP_URL: "https://tvoy-bot.onrender.com" # ВАЖНО: Впиши сюда реальный URL твоего Render!
        run: python .github/scripts/verify_live.py

      - name: Auto-Commit AI Fixes
        run: |
          git config --global user.name "AI QA-Bot"
          git config --global user.email "qa-bot@ai.com"
          git add .
          # Если скрипт изменил файл (нашел ошибку), делаем коммит. Если изменений нет - ничего не делаем.
          git diff --quiet && git diff --staged --quiet || (git commit -m "AI: Срочный фикс боевого сервера" && git push)
