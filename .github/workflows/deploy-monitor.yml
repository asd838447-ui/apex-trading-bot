name: Pre-Deploy Crash Test & Auto-Fix

on:
  push:
    branches:
      - main # Срабатывает только когда код попадает в главную ветку (перед Render)

permissions:
  contents: write

jobs:
  test-and-fix:
    # ПРЕДОТВРАЩЕНИЕ БЕСКОНЕЧНОГО ЦИКЛА: 
    # Скрипт не запустится, если последний коммит сделал сам бот
    if: "!startsWith(github.event.head_commit.message, 'AI:')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python 3.11 (Совпадение с Render)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Project Dependencies
        run: |
          # Устанавливаем все библиотеки твоего проекта (fastapi, uvicorn и т.д.)
          pip install -r requirements.txt
          
          # Доустанавливаем библиотеку для ИИ, чтобы сработал наш скрипт
          pip install google-genai

      - name: Run Local Crash Test & AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Запускаем наш Python-скрипт. Если он найдет баг, он перепишет main.py
        run: python .github/scripts/test_and_fix.py

      - name: Auto-Commit AI Fixes
        # ВАЖНО: Эта строчка заставляет GitHub сделать коммит, 
        # даже если предыдущий шаг (краш-тест) выдал ошибку сервера!
        if: always() 
        run: |
          git config --global user.name "AI QA-Bot"
          git config --global user.email "qa-bot@ai.com"
          git add .
          
          # Проверяем, изменил ли ИИ файлы. Если да - пушим, если нет - ничего не делаем.
          git diff --quiet && git diff --staged --quiet || (git commit -m "AI: Срочный фикс после краш-теста" && git push)
