version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex-trading-bot
    restart: always
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - VAULT_ENCRYPTION_KEY=${VAULT_ENCRYPTION_KEY}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://apex_user:apex_password@postgres:5432/apex_db
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - bot-data:/app/data
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: apex-postgres
    restart: always
    environment:
      - POSTGRES_USER=apex_user
      - POSTGRES_PASSWORD=apex_password
      - POSTGRES_DB=apex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: apex-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data

volumes:
  bot-data:
  redis-data:
  postgres-data:
