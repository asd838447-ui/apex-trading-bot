# render.yaml — Render Blueprint for APEX Trading Bot (Free Tier)
# Deploy: connect GitHub repo → Render auto-detects this file

services:
  # FastAPI Backend + Static Frontend
  - type: web
    name: apex-trading-bot
    runtime: python
    region: frankfurt  # EU region
    plan: free
    buildCommand: |
      set -e
      pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DATABASE_URL
        fromDatabase:
          name: apex-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: apex-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEMO_MODE
        value: "true"
      - key: BINANCE_TESTNET
        value: "true"
      - key: CORS_ORIGINS
        value: ""
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: JWT_EXPIRATION_MINUTES
        value: "1440"
      - key: BINANCE_API_KEY
        value: "demo_binance_key"
      - key: BINANCE_API_SECRET
        value: "demo_binance_secret"
      - key: GLASSNODE_API_KEY
        value: "demo_glassnode_key"
      - key: TELEGRAM_BOT_TOKEN
        value: "demo_telegram_token"
      - key: TELEGRAM_CHAT_ID
        value: "demo_telegram_chat_id"

  # Redis for persistent state across restarts (Free Tier)
  - type: redis
    name: apex-redis
    region: frankfurt
    plan: free
    ipAllowList: []  # only internal access

databases:
  # PostgreSQL for persistent data (Free Tier)
  - name: apex-db
    region: frankfurt
    plan: free
    databaseName: apex_trading
    postgresMajorVersion: "15"
    ipAllowList: []  # only internal access
